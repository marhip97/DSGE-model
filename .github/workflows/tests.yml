name: Testpakke

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer NEMO (editable)
        run: pip install -e ".[dev]"

      - name: Kjør testpakke
        run: pytest tests/ -v --tb=short
