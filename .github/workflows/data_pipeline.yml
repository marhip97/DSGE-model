name: Datapipeline — kvartalsvis oppdatering

on:
  # Kvartalsvis: 15. februar, mai, august, november kl. 06:00 UTC
  # SSB publiserer nasjonalregnskap ~45 dager etter kvartalsslutt
  schedule:
    - cron: "0 6 15 2,5,8,11 *"

  # Manuell kjøring fra GitHub UI
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Tving nye API-kall (ignorer cache)"
        required: false
        default: "false"
        type: boolean
      kpi_jae:
        description: "Hent KPI-JAE (SSB 10235) — standard: alltid på scheduled runs"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write   # trengs for å committe oppdatert nemo_data.csv

jobs:
  oppdater-data:
    runs-on: ubuntu-latest

    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer NEMO
        run: pip install -e .

      - name: Opprett data-mapper
        run: mkdir -p data/raw data/processed

      - name: Kjør datapipeline
        run: |
          FLAGS="--kpi-jae"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.no_cache }}" = "true" ]; then FLAGS="$FLAGS --no-cache"; fi
            if [ "${{ inputs.kpi_jae }}" = "false" ]; then FLAGS="${FLAGS/--kpi-jae/}"; fi
          fi
          python -m nemo.data.pipeline --log-level INFO $FLAGS

      - name: Sjekk om data er endret
        id: diff
        run: |
          git add data/processed/ 2>/dev/null || true
          if git diff --cached --quiet data/processed/; then
            echo "endret=false" >> $GITHUB_OUTPUT
          else
            echo "endret=true" >> $GITHUB_OUTPUT
          fi
          echo "--- Siste observasjon ---"
          tail -2 data/processed/nemo_data_kpi_jae.csv 2>/dev/null || \
          tail -2 data/processed/nemo_data.csv 2>/dev/null || true

      - name: Commit og push oppdatert data
        if: steps.diff.outputs.endret == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SISTE=$(tail -1 data/processed/nemo_data_kpi_jae.csv 2>/dev/null | cut -d',' -f1 || \
                  tail -1 data/processed/nemo_data.csv | cut -d',' -f1)
          git commit -m "[DATA] Kvartalsvis oppdatering — siste obs: ${SISTE}"
          git push

      - name: Ingen endring — data allerede oppdatert
        if: steps.diff.outputs.endret == 'false'
        run: echo "Data er allerede oppdatert. Ingen commit nødvendig."
